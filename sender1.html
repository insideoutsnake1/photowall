<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Photo Wall · Send</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --cork: #c8a96e;
    --paper: #fdf6e3;
    --ink: #3a2a10;
    --accent: #8b6914;
    --red: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #6b4f0a;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(160,120,40,0.5), transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(80,50,10,0.6), transparent 55%);
    min-height: 100vh;
    font-family: 'Caveat', cursive;
    color: var(--ink);
    padding-bottom: 40px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 32px 20px 20px;
    position: relative;
  }

  header h1 {
    font-family: 'Special Elite', cursive;
    font-size: clamp(24px, 7vw, 38px);
    color: var(--paper);
    text-shadow: 1px 3px 8px rgba(0,0,0,0.5);
    letter-spacing: 0.07em;
    margin-bottom: 4px;
  }

  header p {
    color: rgba(255,245,200,0.65);
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing: 0.03em;
  }

  /* Config card */
  .card {
    background: var(--paper);
    margin: 0 auto 20px;
    max-width: 480px;
    width: calc(100% - 32px);
    padding: 24px;
    box-shadow: 3px 5px 20px rgba(0,0,0,0.4);
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 20px;
    background: rgba(255,230,100,0.6);
    border: 1px solid rgba(200,180,60,0.3);
  }

  .card h2 {
    font-family: 'Special Elite', cursive;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1.5px dashed var(--cork);
  }

  label {
    font-family: 'Special Elite', cursive;
    font-size: 11px;
    letter-spacing: 0.07em;
    color: #7a6040;
    display: block;
    margin-bottom: 5px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 9px 12px;
    font-family: 'Caveat', cursive;
    font-size: 15px;
    border: 1.5px solid var(--cork);
    background: #fffdf5;
    color: var(--ink);
    outline: none;
    margin-bottom: 12px;
    border-radius: 2px;
    autocapitalize: none;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    display: block;
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: var(--paper);
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.07em;
    border-radius: 2px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }
  .btn:hover  { background: #6b4f0f; }
  .btn:disabled { background: #bbb; cursor: not-allowed; }

  .btn.secondary {
    background: transparent;
    border: 1.5px solid var(--cork);
    color: var(--accent);
    margin-top: 8px;
  }

  /* Connection status */
  #conn-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #888;
    margin-top: 10px;
    justify-content: center;
  }

  #conn-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #bbb;
    transition: background 0.4s;
    flex-shrink: 0;
  }

  #conn-dot.on  { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
  #conn-dot.off { background: #e74c3c; }

  .err-box {
    display: none;
    background: #f8d7da;
    color: #842029;
    border: 1px solid #f5c2c7;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 12px;
    margin-bottom: 14px;
    border-radius: 2px;
    word-break: break-word;
  }

  /* Drop zone */
  #dropzone {
    max-width: 480px;
    width: calc(100% - 32px);
    margin: 0 auto 20px;
    background: rgba(253,246,227,0.92);
    border: 3px dashed var(--cork);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
    display: none;
  }

  #dropzone.active {
    background: rgba(253,246,227,1);
    border-color: var(--accent);
  }

  #dropzone .icon {
    font-size: 42px;
    margin-bottom: 10px;
    display: block;
  }

  #dropzone .dz-title {
    font-family: 'Special Elite', cursive;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 6px;
  }

  #dropzone .dz-sub {
    font-size: 14px;
    color: #8a7050;
  }

  #file-input { display: none; }

  /* Preview & caption area */
  #preview-area {
    max-width: 480px;
    width: calc(100% - 32px);
    margin: 0 auto 20px;
    display: none;
  }

  #preview-wrapper {
    background: var(--paper);
    padding: 10px 10px 40px;
    box-shadow: 4px 6px 20px rgba(0,0,0,0.4);
    position: relative;
    display: inline-block;
    width: 100%;
  }

  #preview-wrapper::before {
    content: '';
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%) rotate(-1deg);
    width: 52px; height: 20px;
    background: rgba(255,230,100,0.65);
    border: 1px solid rgba(200,180,60,0.3);
  }

  #preview-img {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    display: block;
  }

  #caption-input {
    width: 100%;
    padding: 8px 12px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    border: none;
    border-top: 1.5px dashed var(--cork);
    background: transparent;
    color: #555;
    outline: none;
    text-align: center;
    margin-top: 10px;
  }

  #caption-input::placeholder { color: #ccc; }

  /* Action buttons row */
  #action-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  #action-row .btn { flex: 1; }

  /* Sent feed */
  #sent-feed {
    max-width: 480px;
    width: calc(100% - 32px);
    margin: 0 auto;
    display: none;
  }

  #sent-feed h3 {
    font-family: 'Special Elite', cursive;
    font-size: 14px;
    color: rgba(255,245,200,0.5);
    letter-spacing: 0.07em;
    margin-bottom: 12px;
    text-align: center;
  }

  .sent-thumb {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(253,246,227,0.15);
    padding: 10px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--cork);
  }

  .sent-thumb img {
    width: 44px; height: 44px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .sent-thumb .sent-info {
    flex: 1;
    min-width: 0;
  }

  .sent-thumb .sent-cap {
    font-size: 15px;
    color: var(--paper);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sent-thumb .sent-time {
    font-size: 12px;
    color: rgba(255,245,200,0.45);
  }

  /* Upload progress */
  #progress-bar-wrap {
    height: 4px;
    background: rgba(200,169,110,0.3);
    margin-top: 12px;
    display: none;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #2c1d06;
    color: var(--paper);
    padding: 10px 22px;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
    border-left: 3px solid var(--cork);
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>📷 Send to Wall</h1>
  <p>photos appear on your display instantly</p>
</header>

<!-- Config -->
<div class="card" id="config-card">
  <h2>🔌 Connect to Firebase</h2>
  <div class="err-box" id="err-box"></div>
  <label>API KEY</label>
  <input type="text" id="s-apikey" placeholder="AIzaSy…" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <label>PROJECT ID</label>
  <input type="text" id="s-projectid" placeholder="my-photo-wall-12345" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <label>ROOM NAME (match the display)</label>
  <input type="text" id="s-room" placeholder="main" value="main" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <button class="btn" onclick="connectSender()">Connect</button>
  <div id="conn-status">
    <div id="conn-dot"></div>
    <span id="conn-text">not connected</span>
  </div>
</div>

<!-- Drop zone -->
<div id="dropzone" onclick="document.getElementById('file-input').click()">
  <input type="file" id="file-input" accept="image/*" multiple>
  <span class="icon">📌</span>
  <div class="dz-title">Tap to pick a photo</div>
  <div class="dz-sub">or drag & drop here</div>
</div>

<!-- Preview -->
<div id="preview-area">
  <div id="preview-wrapper">
    <img id="preview-img" src="" alt="preview">
    <input type="text" id="caption-input" placeholder="add a caption…" maxlength="40">
  </div>
  <div id="action-row">
    <button class="btn secondary" onclick="cancelPreview()">✕ Cancel</button>
    <button class="btn" id="send-btn" onclick="sendPhoto()">📌 Pin it!</button>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>

<!-- Sent feed -->
<div id="sent-feed">
  <h3>SENT TO WALL</h3>
  <div id="sent-list"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase compat SDK (works from file:// and plain <script> tags) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  let db, roomRef, currentDataUrl = null, connected = false;

  // ── Drag & drop ──
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover',  function(e) { e.preventDefault(); dz.classList.add('active'); });
  dz.addEventListener('dragleave', function() { dz.classList.remove('active'); });
  dz.addEventListener('drop', function(e) {
    e.preventDefault();
    dz.classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (file) loadPreview(file);
  });

  document.getElementById('file-input').addEventListener('change', function(e) {
    if (e.target.files[0]) loadPreview(e.target.files[0]);
  });

  function loadPreview(file) {
    if (!connected) { showToast('Connect to Firebase first!'); return; }
    const reader = new FileReader();
    reader.onload = function(ev) {
      currentDataUrl = ev.target.result;
      document.getElementById('preview-img').src = currentDataUrl;
      document.getElementById('caption-input').value = '';
      document.getElementById('preview-area').style.display = 'block';
      document.getElementById('dropzone').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function cancelPreview() {
    document.getElementById('preview-area').style.display = 'none';
    document.getElementById('dropzone').style.display = 'block';
    currentDataUrl = null;
    document.getElementById('file-input').value = '';
  }

  function sendPhoto() {
    if (!currentDataUrl || !connected) return;
    const btn = document.getElementById('send-btn');
    const caption = document.getElementById('caption-input').value.trim();

    btn.disabled = true;
    btn.textContent = 'Pinning…';

    const progressWrap = document.getElementById('progress-bar-wrap');
    const progressBar  = document.getElementById('progress-bar');
    progressWrap.style.display = 'block';
    progressBar.style.width = '30%';

    compressImage(currentDataUrl, 800).then(function(compressed) {
      progressBar.style.width = '65%';

      return roomRef.push({
        dataUrl: compressed,
        caption: caption,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
      }).then(function() {
        progressBar.style.width = '100%';
        setTimeout(function() { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 600);

        addSentThumb(compressed, caption);
        showToast('📌 Pinned to the wall!');

        setTimeout(function() {
          cancelPreview();
          btn.disabled = false;
          btn.textContent = '📌 Pin it!';
        }, 400);
      });
    }).catch(function(err) {
      console.error(err);
      showToast('Error: ' + err.message);
      btn.disabled = false;
      btn.textContent = '📌 Pin it!';
      progressWrap.style.display = 'none';
    });
  }

  function compressImage(dataUrl, maxDim) {
    return new Promise(function(resolve) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > height && width > maxDim) { height = height * maxDim / width; width = maxDim; }
        else if (height > maxDim) { width = width * maxDim / height; height = maxDim; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = dataUrl;
    });
  }

  function addSentThumb(dataUrl, caption) {
    const feed = document.getElementById('sent-feed');
    const list = document.getElementById('sent-list');
    feed.style.display = 'block';

    const el = document.createElement('div');
    el.className = 'sent-thumb';
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    el.innerHTML =
      '<img src="' + dataUrl + '" alt="">' +
      '<div class="sent-info">' +
        '<div class="sent-cap">' + (caption || '(no caption)') + '</div>' +
        '<div class="sent-time">sent at ' + now + '</div>' +
      '</div>';
    list.insertBefore(el, list.firstChild);
  }

  function connectSender() {
    const errBox = document.getElementById('err-box');
    errBox.style.display = 'none';

    const apiKey    = document.getElementById('s-apikey').value.trim();
    const projectId = document.getElementById('s-projectid').value.trim();
    const room      = document.getElementById('s-room').value.trim() || 'main';

    if (!apiKey || !projectId) {
      errBox.textContent = 'Fill in API Key and Project ID';
      errBox.style.display = 'block';
      return;
    }

    try {
      firebase.initializeApp({
        apiKey,
        authDomain: projectId + '.firebaseapp.com',
        databaseURL: 'https://' + projectId + '-default-rtdb.firebaseio.com',
        projectId,
      });

      db = firebase.database();
      roomRef = db.ref('walls/' + room + '/photos');

      db.ref('.info/connected').on('value', function(snap) {
        const dot  = document.getElementById('conn-dot');
        const text = document.getElementById('conn-text');
        if (snap.val()) {
          connected = true;
          dot.className = 'on';
          text.textContent = 'connected · ' + room;
          document.getElementById('dropzone').style.display = 'block';
          document.getElementById('config-card').style.opacity = '0.6';
        } else {
          connected = false;
          dot.className = 'off';
          text.textContent = 'reconnecting…';
        }
      }, function(error) {
        errBox.textContent = 'Connection error: ' + error.message;
        errBox.style.display = 'block';
      });
    } catch (e) {
      errBox.textContent = 'Error: ' + e.message;
      errBox.style.display = 'block';
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2800);
  }
</script>
</body>
</html>
