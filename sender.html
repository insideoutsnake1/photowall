<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Photo Wall · Send</title>
<link rel="manifest" href="manifest-sender.json">
<meta name="theme-color" content="#8b6914">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Send to Wall">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --cork: #c8a96e;
    --paper: #fdf6e3;
    --ink: #3a2a10;
    --accent: #8b6914;
    --red: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #6b4f0a;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(160,120,40,0.5), transparent 55%),
      radial-gradient(ellipse at 70% 80%, rgba(80,50,10,0.6), transparent 55%);
    min-height: 100vh;
    font-family: 'Caveat', cursive;
    color: var(--ink);
    padding-bottom: 40px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 32px 20px 20px;
    position: relative;
  }

  header h1 {
    font-family: 'Special Elite', cursive;
    font-size: clamp(24px, 7vw, 38px);
    color: var(--paper);
    text-shadow: 1px 3px 8px rgba(0,0,0,0.5);
    letter-spacing: 0.07em;
    margin-bottom: 4px;
  }

  header p {
    color: rgba(255,245,200,0.65);
    font-size: clamp(14px, 4vw, 18px);
    letter-spacing: 0.03em;
  }

  /* Config card */
  .card {
    background: var(--paper);
    margin: 0 auto 20px;
    max-width: 480px;
    width: calc(100% - 32px);
    padding: 24px;
    box-shadow: 3px 5px 20px rgba(0,0,0,0.4);
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    width: 56px; height: 20px;
    background: rgba(255,230,100,0.6);
    border: 1px solid rgba(200,180,60,0.3);
  }

  .card h2 {
    font-family: 'Special Elite', cursive;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1.5px dashed var(--cork);
  }

  label {
    font-family: 'Special Elite', cursive;
    font-size: 11px;
    letter-spacing: 0.07em;
    color: #7a6040;
    display: block;
    margin-bottom: 5px;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 9px 12px;
    font-family: 'Caveat', cursive;
    font-size: 15px;
    border: 1.5px solid var(--cork);
    background: #fffdf5;
    color: var(--ink);
    outline: none;
    margin-bottom: 12px;
    border-radius: 2px;
    autocapitalize: none;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    display: block;
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: var(--paper);
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.07em;
    border-radius: 2px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:active { transform: scale(0.98); }
  .btn:hover  { background: #6b4f0f; }
  .btn:disabled { background: #bbb; cursor: not-allowed; }

  .btn.secondary {
    background: transparent;
    border: 1.5px solid var(--cork);
    color: var(--accent);
    margin-top: 8px;
  }

  /* Connection status */
  #conn-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #888;
    margin-top: 10px;
    justify-content: center;
  }

  #conn-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #bbb;
    transition: background 0.4s;
    flex-shrink: 0;
  }

  #conn-dot.on  { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
  #conn-dot.off { background: #e74c3c; }

  #change-conn {
    margin-left: 6px;
    text-decoration: underline;
    text-decoration-style: dotted;
    cursor: pointer;
    color: #999;
  }
  #change-conn:hover { color: var(--accent); }

  .err-box {
    display: none;
    background: #f8d7da;
    color: #842029;
    border: 1px solid #f5c2c7;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 12px;
    margin-bottom: 14px;
    border-radius: 2px;
    word-break: break-word;
  }

  /* Drop zone */
  #dropzone {
    max-width: 480px;
    width: calc(100% - 32px);
    margin: 0 auto 20px;
    background: rgba(253,246,227,0.92);
    border: 3px dashed var(--cork);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
    display: none;
  }

  #dropzone.active {
    background: rgba(253,246,227,1);
    border-color: var(--accent);
  }

  #dropzone .icon {
    font-size: 42px;
    margin-bottom: 10px;
    display: block;
  }

  #dropzone .dz-title {
    font-family: 'Special Elite', cursive;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 6px;
  }

  #dropzone .dz-sub {
    font-size: 14px;
    color: #8a7050;
  }

  #file-input { display: none; }

  /* Preview & caption area */
  #preview-area {
    max-width: 480px;
    width: calc(100% - 32px);
    margin: 0 auto 20px;
    display: none;
  }

  #preview-wrapper {
    background: var(--paper);
    padding: 10px 10px 40px;
    box-shadow: 4px 6px 20px rgba(0,0,0,0.4);
    position: relative;
    display: inline-block;
    width: 100%;
  }

  #preview-wrapper::before {
    content: '';
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%) rotate(-1deg);
    width: 52px; height: 20px;
    background: rgba(255,230,100,0.65);
    border: 1px solid rgba(200,180,60,0.3);
  }

  #preview-img {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    display: block;
  }

  #caption-input {
    width: 100%;
    padding: 8px 12px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    border: none;
    border-top: 1.5px dashed var(--cork);
    background: transparent;
    color: #555;
    outline: none;
    text-align: center;
    margin-top: 10px;
  }

  #caption-input::placeholder { color: #ccc; }

  /* Action buttons row */
  #action-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }

  #action-row .btn { flex: 1; }

  /* Sent feed */
  #sent-feed {
    max-width: 480px;
    width: calc(100% - 32px);
    margin: 0 auto;
    display: none;
  }

  #sent-feed h3 {
    font-family: 'Special Elite', cursive;
    font-size: 14px;
    color: rgba(255,245,200,0.5);
    letter-spacing: 0.07em;
    margin-bottom: 12px;
    text-align: center;
  }

  .sent-thumb {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(253,246,227,0.15);
    padding: 10px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--cork);
  }

  .sent-thumb img {
    width: 44px; height: 44px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .sent-thumb .sent-info {
    flex: 1;
    min-width: 0;
  }

  .sent-thumb .sent-cap {
    font-size: 15px;
    color: var(--paper);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sent-thumb .sent-time {
    font-size: 12px;
    color: rgba(255,245,200,0.45);
  }

  .sent-del {
    flex-shrink: 0;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    opacity: 0.55;
    padding: 4px 6px;
    transition: opacity 0.2s, transform 0.15s;
    user-select: none;
  }

  .sent-del:hover, .sent-del:active {
    opacity: 1;
    transform: scale(1.15);
  }

  .sent-thumb.removed {
    opacity: 0.35;
  }

  .sent-thumb.removed .sent-cap::after {
    content: ' (removed from wall)';
    color: rgba(255,160,150,0.7);
  }

  /* Upload progress */
  #progress-bar-wrap {
    height: 4px;
    background: rgba(200,169,110,0.3);
    margin-top: 12px;
    display: none;
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #2c1d06;
    color: var(--paper);
    padding: 10px 22px;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
    border-left: 3px solid var(--cork);
    max-width: 90vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Wall switcher ── */
  #wall-switcher {
    max-width: 480px;
    width: calc(100% - 32px);
    margin: 0 auto 20px;
    display: none;
  }

  #wall-switcher-btn {
    width: 100%;
    background: var(--paper);
    color: var(--ink);
    border: none;
    padding: 11px 16px;
    font-family: 'Special Elite', cursive;
    font-size: 14px;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 2px 3px 12px rgba(0,0,0,0.3);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  #wall-switcher-btn:hover { background: #fffdf5; }

  #wall-menu {
    margin-top: 6px;
    background: var(--paper);
    box-shadow: 3px 5px 18px rgba(0,0,0,0.4);
    border-radius: 2px;
    padding: 8px;
    max-height: 240px;
    overflow-y: auto;
  }

  #wall-menu.hidden { display: none; }

  .wall-item {
    padding: 9px 12px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--ink);
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .wall-item:hover { background: rgba(200,169,110,0.25); }

  .wall-item.active {
    background: rgba(139,105,20,0.18);
    font-weight: 600;
  }

  .wall-loading {
    padding: 9px 12px;
    font-size: 14px;
    color: #aaa;
    font-family: 'Caveat', cursive;
  }

  .wall-new {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1.5px dashed var(--cork);
  }

  .wall-new input {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    font-family: 'Caveat', cursive;
    font-size: 15px;
    border: 1.5px solid var(--cork);
    background: #fffdf5;
    color: var(--ink);
    outline: none;
    border-radius: 2px;
    margin-bottom: 0;
  }

  .wall-new button {
    padding: 8px 12px;
    background: var(--accent);
    color: var(--paper);
    border: none;
    font-family: 'Special Elite', cursive;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
  }

  .wall-new button:hover { background: #6b4f0f; }
</style>
</head>
<body>

<header>
  <h1>📷 Send to Wall</h1>
  <p>photos appear on your display instantly</p>
</header>

<!-- Config -->
<div class="card" id="config-card">
  <h2>🔌 Connect to Firebase</h2>
  <div class="err-box" id="err-box"></div>
  <label>API KEY</label>
  <input type="text" id="s-apikey" placeholder="AIzaSy…" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <label>PROJECT ID</label>
  <input type="text" id="s-projectid" placeholder="my-photo-wall-12345" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <label>ROOM NAME (match the display)</label>
  <input type="text" id="s-room" placeholder="main" value="main" autocapitalize="off" autocorrect="off" spellcheck="false" />
  <button class="btn" onclick="connectSender()">Connect</button>
  <div id="conn-status">
    <div id="conn-dot"></div>
    <span id="conn-text">not connected</span>
    <span id="change-conn" onclick="resetConnection()" style="display:none;">change</span>
  </div>
</div>

<!-- Wall switcher -->
<div id="wall-switcher">
  <button id="wall-switcher-btn" onclick="toggleWallMenu()">📌 Sending to: <span id="room-label">main</span> ▾</button>
  <div id="wall-menu" class="hidden">
    <div id="wall-list"></div>
    <div class="wall-new">
      <input id="new-wall-input" placeholder="new wall name" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <button onclick="createWall()">+ Create</button>
    </div>
  </div>
</div>

<!-- Drop zone -->
<div id="dropzone" onclick="document.getElementById('file-input').click()">
  <input type="file" id="file-input" accept="image/*" multiple>
  <span class="icon">📌</span>
  <div class="dz-title">Tap to pick a photo</div>
  <div class="dz-sub">or drag & drop here</div>
</div>

<!-- Preview -->
<div id="preview-area">
  <div id="preview-wrapper">
    <img id="preview-img" src="" alt="preview">
    <input type="text" id="caption-input" placeholder="add a caption…" maxlength="40">
  </div>
  <div id="action-row">
    <button class="btn secondary" onclick="cancelPreview()">✕ Cancel</button>
    <button class="btn" id="send-btn" onclick="sendPhoto()">📌 Pin it!</button>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>

<!-- Sent feed -->
<div id="sent-feed">
  <h3>SENT TO WALL</h3>
  <div id="sent-list"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase compat SDK (works from file:// and plain <script> tags) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  let db, roomRef, currentDataUrl = null, connected = false;
  let currentRoom = 'main';

  // ── Drag & drop ──
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover',  function(e) { e.preventDefault(); dz.classList.add('active'); });
  dz.addEventListener('dragleave', function() { dz.classList.remove('active'); });
  dz.addEventListener('drop', function(e) {
    e.preventDefault();
    dz.classList.remove('active');
    const file = e.dataTransfer.files[0];
    if (file) loadPreview(file);
  });

  document.getElementById('file-input').addEventListener('change', function(e) {
    if (e.target.files[0]) loadPreview(e.target.files[0]);
  });

  function loadPreview(file) {
    if (!connected) { showToast('Connect to Firebase first!'); return; }
    const reader = new FileReader();
    reader.onload = function(ev) {
      currentDataUrl = ev.target.result;
      document.getElementById('preview-img').src = currentDataUrl;
      document.getElementById('caption-input').value = '';
      document.getElementById('preview-area').style.display = 'block';
      document.getElementById('dropzone').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  function cancelPreview() {
    document.getElementById('preview-area').style.display = 'none';
    document.getElementById('dropzone').style.display = 'block';
    currentDataUrl = null;
    document.getElementById('file-input').value = '';
  }

  function sendPhoto() {
    if (!currentDataUrl || !connected) return;
    const btn = document.getElementById('send-btn');
    const caption = document.getElementById('caption-input').value.trim();

    btn.disabled = true;
    btn.textContent = 'Pinning…';

    const progressWrap = document.getElementById('progress-bar-wrap');
    const progressBar  = document.getElementById('progress-bar');
    progressWrap.style.display = 'block';
    progressBar.style.width = '30%';

    compressImage(currentDataUrl, 800).then(function(compressed) {
      progressBar.style.width = '65%';

      const newRef = roomRef.push();
      const key = newRef.key;

      return newRef.set({
        dataUrl: compressed,
        caption: caption,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
      }).then(function() {
        progressBar.style.width = '100%';
        setTimeout(function() { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 600);

        addSentThumb(key, compressed, caption);
        showToast('📌 Pinned to the wall!');

        setTimeout(function() {
          cancelPreview();
          btn.disabled = false;
          btn.textContent = '📌 Pin it!';
        }, 400);
      });
    }).catch(function(err) {
      console.error(err);
      showToast('Error: ' + err.message);
      btn.disabled = false;
      btn.textContent = '📌 Pin it!';
      progressWrap.style.display = 'none';
    });
  }

  function compressImage(dataUrl, maxDim) {
    return new Promise(function(resolve) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height;
        if (width > height && width > maxDim) { height = height * maxDim / width; width = maxDim; }
        else if (height > maxDim) { width = width * maxDim / height; height = maxDim; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = dataUrl;
    });
  }

  function addSentThumb(key, dataUrl, caption) {
    const feed = document.getElementById('sent-feed');
    const list = document.getElementById('sent-list');
    feed.style.display = 'block';

    const el = document.createElement('div');
    el.className = 'sent-thumb';
    el.dataset.key = key;
    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    el.innerHTML =
      '<img src="' + dataUrl + '" alt="">' +
      '<div class="sent-info">' +
        '<div class="sent-cap">' + (caption || '(no caption)') + '</div>' +
        '<div class="sent-time">sent at ' + now + '</div>' +
      '</div>' +
      '<div class="sent-del" title="Remove from wall">🗑</div>';

    el.querySelector('.sent-del').addEventListener('click', function() {
      if (!confirm('Remove this photo from the wall?')) return;
      roomRef.child(key).remove().then(function() {
        el.classList.add('removed');
        showToast('🗑 Removed from wall');
      }).catch(function(err) {
        showToast('Error: ' + err.message);
      });
    });

    list.insertBefore(el, list.firstChild);
  }

  function connectSender() {
    const errBox = document.getElementById('err-box');
    errBox.style.display = 'none';

    const apiKey    = document.getElementById('s-apikey').value.trim();
    const projectId = document.getElementById('s-projectid').value.trim();
    const room      = document.getElementById('s-room').value.trim() || 'main';

    if (!apiKey || !projectId) {
      errBox.textContent = 'Fill in API Key and Project ID';
      errBox.style.display = 'block';
      return;
    }

    try {
      firebase.initializeApp({
        apiKey,
        authDomain: projectId + '.firebaseapp.com',
        databaseURL: 'https://' + projectId + '-default-rtdb.firebaseio.com',
        projectId,
      });

      db = firebase.database();
      currentRoom = room;
      roomRef = db.ref('walls/' + currentRoom + '/photos');

      db.ref('.info/connected').on('value', function(snap) {
        const dot  = document.getElementById('conn-dot');
        const text = document.getElementById('conn-text');
        if (snap.val()) {
          connected = true;
          dot.className = 'on';
          text.textContent = 'connected · ' + currentRoom;
          document.getElementById('dropzone').style.display = 'block';
          document.getElementById('config-card').style.opacity = '0.6';
          document.getElementById('wall-switcher').style.display = 'block';
          document.getElementById('room-label').textContent = currentRoom;
          document.getElementById('change-conn').style.display = 'inline';
          saveConfig();
        } else {
          connected = false;
          dot.className = 'off';
          text.textContent = 'reconnecting…';
        }
      }, function(error) {
        errBox.textContent = 'Connection error: ' + error.message;
        errBox.style.display = 'block';
      });
    } catch (e) {
      errBox.textContent = 'Error: ' + e.message;
      errBox.style.display = 'block';
    }
  }

  // ── Remember Firebase config so the page reconnects automatically ──
  const STORAGE_KEY = 'photoWallSenderConfig';

  function saveConfig() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        apiKey: document.getElementById('s-apikey').value.trim(),
        projectId: document.getElementById('s-projectid').value.trim(),
        room: currentRoom,
      }));
    } catch (e) {}
  }

  function loadSavedConfig() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (saved && saved.apiKey && saved.projectId) {
        document.getElementById('s-apikey').value = saved.apiKey;
        document.getElementById('s-projectid').value = saved.projectId;
        document.getElementById('s-room').value = saved.room || 'main';
        connectSender();
      }
    } catch (e) {}
  }

  function resetConnection() {
    if (!confirm('Disconnect and clear saved Firebase login?')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    location.reload();
  }

  // Register service worker (lets this page be installed as an app)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }

  // Try to auto-connect on load using saved credentials
  loadSavedConfig();

  function switchRoom(newRoom) {
    if (!db || newRoom === currentRoom) return;
    currentRoom = newRoom;
    roomRef = db.ref('walls/' + currentRoom + '/photos');
    document.getElementById('room-label').textContent = currentRoom;

    const text = document.getElementById('conn-text');
    if (connected) {
      text.textContent = 'connected · ' + currentRoom;
      saveConfig();
    }
  }

  function toggleWallMenu() {
    const menu = document.getElementById('wall-menu');
    if (menu.classList.contains('hidden')) {
      refreshWallList();
      menu.classList.remove('hidden');
    } else {
      menu.classList.add('hidden');
    }
  }

  function refreshWallList() {
    const listEl = document.getElementById('wall-list');
    listEl.innerHTML = '<div class="wall-loading">loading…</div>';
    if (!db) return;

    db.ref('walls').once('value').then(function(snap) {
      const val = snap.val();
      const rooms = val ? Object.keys(val) : [];
      if (rooms.indexOf(currentRoom) === -1) rooms.push(currentRoom);
      rooms.sort();

      listEl.innerHTML = '';
      rooms.forEach(function(r) {
        const item = document.createElement('div');
        item.className = 'wall-item' + (r === currentRoom ? ' active' : '');
        item.textContent = r;
        item.onclick = function() {
          switchRoom(r);
          toggleWallMenu();
        };
        listEl.appendChild(item);
      });
    }).catch(function() {
      listEl.innerHTML = '<div class="wall-loading">error loading walls</div>';
    });
  }

  function createWall() {
    const input = document.getElementById('new-wall-input');
    const name = input.value.trim();
    if (!name) return;
    switchRoom(name);
    input.value = '';
    toggleWallMenu();
  }

  // Close the wall-switcher dropdown when tapping outside it
  document.addEventListener('pointerdown', function(e) {
    const switcher = document.getElementById('wall-switcher');
    const menu = document.getElementById('wall-menu');
    if (!menu.classList.contains('hidden') && !switcher.contains(e.target)) {
      menu.classList.add('hidden');
    }
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2800);
  }
</script>
</body>
</html>
